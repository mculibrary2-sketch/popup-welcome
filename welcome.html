<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">
<title>Welcome</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
}

/* Fullscreen popup */
#popup {
  translateX(-50%) scale(1.05);
  }

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

/* Fullscreen image */
#popup img {
  width: 60%;
  height: 60vh;
  object-fit: cover;
}

/* Dark overlay (makes text readable) */
#overlay {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.2);
}

/* Button styling */
body {
  margin: 0;
  font-family: Arial, sans-serif;
}

#popup {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100vh;
  overflow: hidden;
}

/* Image brighter */
#popup img {
  width: 100%;
  height: 100vh;
  object-fit: cover;
  filter: brightness(1.2); /* makes image brighter */
}

/* Light overlay (very soft) */
#overlay {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.15);
  z-index: 1;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
}

#popup {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100vh;
  overflow: hidden;
}

/* Image */
#popup img {
  width: 100%;
  height: 100vh;
  object-fit: cover;
  filter: brightness(1.15);
  position: absolute;
  top: 0;
  left: 0;
  z-index: 0;
}

/* Overlay */
#overlay {
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.1);
  z-index: 1;
}

/* BUTTON (force on top) */
.close-btn {
  position: absolute;
  bottom: 50px;
  left: 50%;
  transform: translateX(-50%);
  padding: 14px 30px;
  background: #0b3d91;
  color: #fff;
  border: none;
  cursor: pointer;
  border-radius: 6px;
  font-size: 18px;
  z-index: 9999; /* FORCE FRONT */
}
</style>
</head>

<body>

<div id="popup">
  <img src="https://i.postimg.cc/76s8vksk/vc.jpg">

  <div id="overlay"></div>

  <button class="close-btn" onclick="enterSite()">
    Enter Site
  </button>
</div>

<script>
function enterSite() {
  window.location.href = "https://sites.google.com/view/mcphersonlibrary/home";
}
</script>

</body>
</html>
