<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      overflow-x: hidden;
      background: #000;
    }

    /* POPUP CONTAINER */
    #popup {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 90%;
      max-width: 900px;
      animation: fadeIn 0.8s ease-in-out;
      z-index: 2;
      max-height: 90vh;
      overflow: hidden;
      border-radius: 10px;
      background: #000;
    }

    /* IMAGE */
    #popup img {
      width: 100%;
      height: auto;
      max-height: 70vh;
      display: block;
      object-fit: contain;
      filter: brightness(1.1);
    }

    /* BUTTON */
    .close-btn {
      display: block;
      width: 80%;
      max-width: 250px;
      margin: 15px auto;
      padding: 12px;
      background: #0b3d91;
      color: #fff;
      border: none;
      cursor: pointer;
      border-radius: 6px;
      font-size: 16px;
      font-weight: bold;
    }

    /* MOBILE FIX */
    @media (max-width: 600px) {
      #popup {
        width: 95%;
        max-height: 85vh;
      }

      #popup img {
        max-height: 60vh;
      }

      .close-btn {
        width: 90%;
        font-size: 14px;
        padding: 10px;
      }
    }

    /* Background Overlay */
#overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
 background: rgba(0, 0, 0, 0.6);
  z-index: 1;
}

    /* Fade Animation */
@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translate(-50%, -60%);
  }
  to {
    opacity: 1;
    transform: translate(-50%, -50%);
  }
}
  </style>
</head>

<body>
  <div id="overlay"></div>

  <div id="popup">
    <img src="https://i.postimg.cc/76s8vksk/vc.jpg">
    
    <button class="close-btn" onclick="enterSite()">
      Enter Site
    </button>
  </div>

  <script>
    function enterSite() {
      window.location.href = "https://sites.google.com/view/mcphersonlibrary/home";
    }
  </script>

</body>
</html>
