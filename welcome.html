<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Welcome</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
}

/* Fullscreen popup */
#popup {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100vh;
  overflow: hidden;
}

/* Fullscreen image */
#popup img {
  width: 100%;
  height: 100vh;
  object-fit: cover;
}

/* Dark overlay (makes text readable) */
#overlay {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.4);
}

/* Button styling */
.close-btn {
  position: absolute;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);
  padding: 14px 30px;
  background: #0b3d91;
  color: #fff;
  border: none;
  cursor: pointer;
  border-radius: 6px;
  font-size: 18px;
}
</style>
</head>

<body>

<div id="popup">
  <img src="https://i.postimg.cc/76s8vksk/vc.jpg">

  <div id="overlay"></div>

  <button class="close-btn" onclick="enterSite()">
    Enter Site
  </button>
</div>

<script>
function enterSite() {
  window.location.href = "https://sites.google.com/view/mcphersonlibrary/home";
}
</script>

</body>
</html>
