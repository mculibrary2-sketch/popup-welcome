<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Welcome</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
}

/* Popup background */
#popup {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.8);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999;
}

/* Popup content */
#popup-content {
  background: #fff;
  padding: 10px;
  border-radius: 10px;
  max-width: 90%;
  text-align: center;
}

/* Image */
#popup img {
  max-width: 100%;
  height: auto;
  border-radius: 10px;
}

/* Close button */
.close-btn {
  margin-top: 10px;
  padding: 10px 20px;
  background: #0b3d91;
  color: #fff;
  border: none;
  cursor: pointer;
  border-radius: 5px;
}
</style>
</head>

<body>

<div id="popup">
  <div id="popup-content">
    <img src="https://drive.google.com/uc?export=view&id=1R9fsyhdfEf-7KArhXZM_xRXeMoaNlcfx">
    <br>
    <button class="close-btn" onclick="closePopup()">Enter Site</button>
  </div>
</div>

<script>
function closePopup() {
  document.getElementById("popup").style.display = "none";
}
</script>

</body>
</html>
