<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Welcome</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
}

/* Popup background */
#popup {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.8);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999;
}

/* Popup content */
#popup-content {
  background: transparent;
  padding: 0;
  width: 100%;
  height: 100%;
  text-align: center;
}

/* Image */
#popup img {
  width: 100%;
  height: 100vh;
  object-fit: cover;
}

/* Close button */
.close-btn {
  position: absolute;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);
}
</style>
</head>

<body>

<div id="popup">
  <div id="popup-content">
    <img src="https://i.postimg.cc/76s8vksk/vc.jpg">
    <br>
    <<button class="close-btn" onclick="enterSite()">Enter Site</button>
  </div>
</div>

<script>
function enterSite() {
  window.location.href = "https://sites.google.com/view/mcphersonlibrary/home";
}
</script>

</body>
</html>
